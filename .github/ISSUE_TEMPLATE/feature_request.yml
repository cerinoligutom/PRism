name: Feature request
description: Propose a new capability or enhancement.
title: "feat: <short description>"
labels: ["type:feat", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for new functionality. For bugs, use the Bug report template.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should PRism do? Sketch the user-facing behaviour.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of conditions for "done".
      placeholder: |
        - [ ] The dashboard groups PRs by reviewer
        - [ ] Grouping toggle persists across sessions
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider? Why not those?
    validations:
      required: false
  - type: textarea
    id: refs
    attributes:
      label: References
      description: Links to PRD sections, ADRs, related issues, screenshots.
    validations:
      required: false
