name: Chore / maintenance
description: Repo plumbing, refactors, dependency updates, docs.
title: "chore: <short description>"
labels: ["type:chore", "needs-triage"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What needs doing?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why now? What does this unblock or improve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Bump dependency X to version Y
        - [ ] CI green
    validations:
      required: true
