name: Bug report
description: Something isn't working as expected.
title: "fix: <short description>"
labels: ["type:fix", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please give us enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Add a PAT for account "Work".
        2. Open the "Authored by me" view.
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead. Include error messages or screenshots.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PRism version
      placeholder: e.g. 0.1.0 or commit SHA
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other / multiple
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: Paste any relevant log output here. Scrub tokens and secrets first.
      render: shell
    validations:
      required: false
