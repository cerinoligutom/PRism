name: Tag on release merge

# Second half of the manual-trigger release pipeline (ADR-0023). Watches
# pushes to main for the shape produced by `prepare-release.yml`:
#
#   - the head commit's subject matches `^chore\(release\): v<X.Y.Z>`;
#   - the commit touched the three release-relevant files
#     (CHANGELOG.md, package.json, src-tauri/Cargo.toml).
#
# Both conditions must hold. Ordinary `chore(...)` commits (notably
# `chore(deps): bump foo`) and one-file CHANGELOG nudges MUST NOT trip
# this workflow, since the tag push downstream (in release.yml, #304)
# kicks off the real build matrix.
#
# When the shape matches, the workflow reads the version from
# package.json's `version` field, creates `vX.Y.Z` against the merge
# commit, and pushes it. The tag push is what trips release.yml; this
# workflow does not invoke it directly.

on:
  push:
    branches: [main]
    # Pre-filter on the three release files so most non-release pushes
    # never spin up a runner. The job step still verifies the full shape
    # before tagging - paths alone can match a single-file CHANGELOG edit,
    # which we don't want to tag.
    paths:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'src-tauri/Cargo.toml'

# Tag push needs write access to contents. GITHUB_TOKEN is sufficient.
permissions:
  contents: write

# One tag per push. Serialise to avoid a second prep PR landing while the
# first tag is still being pushed.
concurrency:
  group: tag-on-release-merge
  cancel-in-progress: false

jobs:
  tag:
    name: Detect release merge + push tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v6
        with:
          # `git tag` + `git push origin <tag>` need history + push creds.
          fetch-depth: 0
          persist-credentials: true

      - name: Detect release-merge shape
        id: detect
        run: |
          set -euo pipefail

          # Read the subject + name-only file list of the head commit
          # independently. `--name-only` interleaving with `--pretty`
          # output varies subtly across git versions (blank-line
          # separator behaviour), so probing each piece on its own is
          # the resilient shape.
          SUBJECT="$(git log -1 --pretty=format:'%s' HEAD)"
          mapfile -t FILES < <(git show --pretty=format: --name-only HEAD | sed '/^$/d')

          echo "Head subject: ${SUBJECT}"
          echo "Files touched:"
          for f in ${FILES[@]+"${FILES[@]}"}; do echo "  - $f"; done

          # Subject regex: `chore(release): vX.Y.Z` optionally followed by
          # the squash-merge `(#NNN)` suffix gh adds. Anchored at both
          # ends so a stray `chore(release): vX.Y.Z and also other stuff`
          # doesn't trip.
          if ! printf '%s' "$SUBJECT" | grep -Eq '^chore\(release\): v[0-9]+\.[0-9]+\.[0-9]+( \(#[0-9]+\))?$'; then
            echo 'Head commit subject does not match the release shape; nothing to do.'
            echo 'match=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Confirm all three release-shape files are in the diff. A
          # single-file CHANGELOG nudge slips through the paths filter but
          # must not trip the tag push.
          need_changelog=0
          need_package=0
          need_cargo=0
          for f in ${FILES[@]+"${FILES[@]}"}; do
            case "$f" in
              CHANGELOG.md)         need_changelog=1 ;;
              package.json)         need_package=1   ;;
              src-tauri/Cargo.toml) need_cargo=1     ;;
            esac
          done

          if [ "$need_changelog" -ne 1 ] || [ "$need_package" -ne 1 ] || [ "$need_cargo" -ne 1 ]; then
            echo "::warning::Subject looked like a release but the commit didn't touch CHANGELOG.md + package.json + src-tauri/Cargo.toml. Skipping tag push."
            echo 'match=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'match=true' >> "$GITHUB_OUTPUT"

      - name: Read version from package.json
        if: ${{ steps.detect.outputs.match == 'true' }}
        id: version
        run: |
          set -euo pipefail
          # Read with node so we don't depend on jq being present and we
          # get a real JSON parser rather than a regex.
          VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::package.json version '${VERSION}' is not bare SemVer"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Refuse to re-tag an existing version
        if: ${{ steps.detect.outputs.match == 'true' }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${NEXT_TAG}" >/dev/null; then
            echo "::error::tag ${NEXT_TAG} already exists; aborting"
            exit 1
          fi

      - name: Configure git author
        if: ${{ steps.detect.outputs.match == 'true' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create + push tag
        if: ${{ steps.detect.outputs.match == 'true' }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.tag }}
          NEXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git tag -a "$NEXT_TAG" -m "Release ${NEXT_TAG}" "$GITHUB_SHA"
          git push origin "$NEXT_TAG"
          {
            echo "Pushed tag **${NEXT_TAG}** at \`${GITHUB_SHA}\`."
            echo ''
            echo "Downstream \`release.yml\` will pick this tag up and run the cross-platform build matrix."
          } >> "$GITHUB_STEP_SUMMARY"
